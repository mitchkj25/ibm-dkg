services:
  # ── Neo4j graph database ───────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.24-community
    container_name: ibm-scout-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── IBM Scout API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibm-scout-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      WATSONX_API_KEY: ${WATSONX_API_KEY:-}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_URL: ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      WATSONX_MODEL_ID: ${WATSONX_MODEL_ID:-ibm/granite-13b-instruct-v2}
      PRUNING_INTERVAL_HOURS: ${PRUNING_INTERVAL_HOURS:-6}
      DEFAULT_NODE_TTL_DAYS: ${DEFAULT_NODE_TTL_DAYS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./data:/app/data

volumes:
  neo4j_data:
  neo4j_logs:
