<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IBM Scout — Seller Profile</title>
<link rel="icon" href="assets/scout-logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ibm-blue:#0f62fe;--ibm-dk:#0043ce;--ibm-teal:#009d9a;--ibm-cyan:#1192e8;
  --ibm-purple:#6929c4;--ibm-orange:#ff832b;--ibm-red:#da1e28;
  --ibm-green:#24a148;--ibm-yellow:#f1c21b;
  --bg:#f0f4ff;--surface:#ffffff;--card:#f4f7ff;
  --border:#dde2f0;--tp:#161616;--ts:#525252;--tm:#8d8d8d;--r:10px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tp);
  font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(0,0,80,.15);border-radius:10px}
#hdr{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:16px;
  padding:0 28px;height:54px;background:rgba(255,255,255,0.95);
  border-bottom:1px solid var(--border);backdrop-filter:blur(16px);box-shadow:0 1px 4px rgba(0,0,60,.06)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--tp)}
.logo img{width:28px;height:28px;object-fit:contain;border-radius:4px}
.logo-txt{font-size:14px;font-weight:700}.logo-txt span{color:var(--ibm-blue)}
.hdr-div{width:1px;height:20px;background:var(--border)}
.hdr-nav{display:flex;gap:4px}
.hdr-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid transparent;color:var(--ts);transition:all .15s;background:none;
  text-decoration:none;display:flex;align-items:center;gap:5px}
.hdr-btn:hover{color:var(--tp);background:var(--surface);border-color:var(--border)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#page{max-width:1160px;margin:0 auto;padding:32px 28px 80px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tm);margin-bottom:20px}
.breadcrumb a{color:var(--ts);text-decoration:none}.breadcrumb a:hover{color:var(--ibm-blue)}
.breadcrumb-sep{opacity:.4}
/* Hero */
#hero-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:24px 28px;margin-bottom:24px;display:flex;align-items:flex-start;gap:20px}
.hero-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;border:2px solid var(--border)}
.hero-body{flex:1;min-width:0}
.hero-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.hero-title{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--ts);margin-bottom:10px}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap}
.h-tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;text-align:center;min-width:100px}
.stat-num{font-size:28px;font-weight:700;line-height:1}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--ts);margin-top:3px}
/* KPI */
#kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.kpi-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px}
.kpi-label{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:.5px}
.kpi-sub{font-size:10px;color:var(--tm);margin-top:3px}
/* Layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  color:var(--ts);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.cnt{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:9px;color:var(--tp)}
.data-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.data-row:last-child{border-bottom:none}
.data-row:hover{background:rgba(15,98,254,.05);margin:0 -6px;padding:9px 6px;border-radius:6px}
.dr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dr-name{flex:1;font-size:12px;font-weight:600;color:var(--tp)}
.dr-sub{font-size:10px;color:var(--ts)}
.dr-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:4px;white-space:nowrap}
.empty-state{font-size:12px;color:var(--tm);font-style:italic;padding:8px 0}
/* Manager card */
.mgr-card{background:var(--surface);border:1px solid rgba(0,157,154,.25);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;margin-bottom:12px}
.mgr-card:hover{border-color:rgba(0,157,154,.5)}
.mgr-avatar{width:40px;height:40px;border-radius:50%;background:rgba(0,157,154,.12);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mgr-name{font-size:13px;font-weight:700;color:var(--tp)}
.mgr-role{font-size:10px;color:var(--ts);margin-top:2px}
/* Product tag */
.prod-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.prod-row:last-child{border-bottom:none}
.prod-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.prod-name{flex:1;font-size:12px;font-weight:600;color:var(--tp)}
.prod-badge{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:4px}
/* Actions */
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.action-btn{padding:9px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;
  border:1px solid;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.action-btn.primary{background:var(--ibm-blue);border-color:var(--ibm-blue);color:#fff}
.action-btn.primary:hover{background:var(--ibm-dk)}
.action-btn.secondary{background:var(--card);border-color:var(--border);color:var(--ts)}
.action-btn.secondary:hover{background:#eef2ff;color:var(--tp)}
</style>
</head>
<body>
<header id="hdr">
  <a class="logo" href="search.html"><img src="assets/scout-logo.png" alt="IBM Scout" onerror="this.style.display='none'"/>
    <div class="logo-txt">IBM <span>Scout</span></div></a>
  <div class="hdr-div"></div>
  <nav class="hdr-nav">
    <a href="search.html" class="hdr-btn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Search
    </a>
    <a href="index.html" class="hdr-btn">

  </nav>
  <div class="hdr-right"><span id="mode-badge" style="padding:3px 8px;border-radius:8px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:rgba(255,131,43,.1);color:var(--ibm-orange);border:1px solid rgba(255,131,43,.2)">Demo Mode</span></div>
</header>

<div id="page">
  <div class="breadcrumb"><a href="search.html">IBM Scout</a><span class="breadcrumb-sep">›</span><a href="search.html">Sellers</a><span class="breadcrumb-sep">›</span><span id="bc-name">Loading…</span></div>

  <div id="hero-banner">

    <div class="kpi-card"><div class="kpi-val" id="kpi-deps" style="color:var(--ibm-purple)">—</div><div class="kpi-label">Deployments Driving</div><div class="kpi-sub" id="kpi-deps-sub"></div></div>
    <div class="kpi-card"><div class="kpi-val" id="kpi-geo" style="color:var(--ibm-teal)">—</div><div class="kpi-label">Geography</div><div class="kpi-sub" id="kpi-territory-sub"></div></div>
  </div>

  <div id="mgr-section" style="margin-bottom:24px;display:none">

  <div class="two-col">

  <div class="two-col">

  <div class="action-row" id="action-row">
    <a href="search.html" class="action-btn secondary">← Back to Search</a>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

const SELLERS = {
  'sel-001':{id:'sel-001',name:'Marcus Webb',email:'mwebb@ibm.com',band:'Band 8',geo:'New York, NY',role:'Client Executive',sellerType:'CE',hireDate:'2019-03-15',description:'Enterprise CE covering BFSI accounts in NYC metro. Primary CE for First National Bancorp and Cascadia Insurance.',managerId:'mgr-001',territories:['ter-001'],accounts:['acc-001','acc-005'],products:['prd-004','prd-007'],deployments:['dep-001','dep-003','dep-005'],cosell:['sel-002']},
  'sel-002':{id:'sel-002',name:'Aisha Thornton',email:'athornton@ibm.com',band:'Band 7',geo:'Boston, MA',role:'BSS / watsonx AI & Automation',sellerType:'BSS',hireDate:'2021-06-01',description:'watsonx AI & Automation specialist covering New England. Co-sells with Marcus Webb on FNB watsonx expansion.',managerId:'mgr-001',territories:['ter-002'],accounts:['acc-001','acc-004'],products:['prd-001','prd-002','prd-003'],deployments:[],cosell:['sel-001']},
  'sel-003':{id:'sel-003',name:'James Kowalski',email:'jkowalski@ibm.com',band:'Band 8',geo:'Atlanta, GA',role:'Client Executive',sellerType:'CE',hireDate:'2017-09-20',description:'Healthcare and retail verticals, Southeast region. Owns Meridian Health and Nova Retail.',managerId:'mgr-002',territories:['ter-003'],accounts:['acc-002','acc-003'],products:['prd-006'],deployments:['dep-004'],cosell:['sel-004']},
  'sel-004':{id:'sel-004',name:'Lin Mei Zhang',email:'lzhang@ibm.com',band:'Band 7',geo:'Miami, FL',role:'Technology Sales Specialist',sellerType:'TSL',hireDate:'2022-01-10',description:'Cloud and Infrastructure specialist covering Florida. Co-sells with James Kowalski on Nova Retail.',managerId:'mgr-002',territories:['ter-003'],accounts:['acc-003','acc-006'],products:['prd-001','prd-007'],deployments:[],cosell:['sel-003']},
  'sel-005':{id:'sel-005',name:'Tyler Oduya',email:'toduya@ibm.com',band:'Band 8',geo:'San Francisco, CA',role:'Client Executive',sellerType:'CE',hireDate:'2018-11-05',description:'Tech and media accounts in Bay Area. Primary CE for Apex Technology Partners.',managerId:'mgr-003',territories:['ter-004'],accounts:['acc-004'],products:['prd-001','prd-007'],deployments:['dep-002'],cosell:[]},
  'sel-006':{id:'sel-006',name:'Rachel Patel',email:'rpatel@ibm.com',band:'Band 7',geo:'Los Angeles, CA',role:'BSS / Security Specialist',sellerType:'BSS',hireDate:'2023-03-01',description:'Security and Compliance specialist for Southern California. Covers SunCoast Logistics.',managerId:'mgr-003',territories:['ter-005'],accounts:['acc-006'],products:['prd-004','prd-005'],deployments:[],cosell:[]},
  'sel-007':{id:'sel-007',name:'Monique Tureaud',email:'mtureaud@ibm.com',band:'Band 7',geo:'Baton Rouge, LA',role:'Brand Sales Specialist (TSL)',sellerType:'TSL',hireDate:'2020-08-01',description:'TSL covering IBM Cognos Analytics and Planning Analytics for Louisiana Public Sector. Peer to Derek Callahan (ATL).',managerId:'mgr-002',territories:[],accounts:['acc-007'],products:['prd-008'],deployments:['dep-006','dep-007'],cosell:[]},
};

const MANAGERS = {
  'mgr-001':{id:'mgr-001',name:'Sandra Okafor',email:'sokafor@ibm.com',role:'First Line Manager',band:'Band 10',territory:'Northeast US'},
  'mgr-002':{id:'mgr-002',name:'David Reyes',email:'dreyes@ibm.com',role:'First Line Manager',band:'Band 10',territory:'Southeast US'},
  'mgr-003':{id:'mgr-003',name:'Priya Nambiar',email:'pnambiar@ibm.com',role:'Second Line Manager',band:'Band 11',territory:'West US'},
  'mgr-004':{id:'mgr-004',name:'Derek Callahan',email:'dcallahan@ibm.com',role:'ATL — Area Tech Leader',band:'Band 9',territory:'Public Sector South'},
};

const ACCOUNTS_SHORT = {
  'acc-001':{id:'acc-001',name:'First National Bancorp',industry:'Financial Services',segment:'Enterprise'},
  'acc-002':{id:'acc-002',name:'Meridian Health Systems',industry:'Healthcare',segment:'Enterprise'},
  'acc-003':{id:'acc-003',name:'Nova Retail Group',industry:'Retail',segment:'Mid-Market'},
  'acc-004':{id:'acc-004',name:'Apex Technology Partners',industry:'Technology',segment:'Enterprise'},
  'acc-005':{id:'acc-005',name:'Cascadia Insurance Group',industry:'Insurance',segment:'Enterprise'},
  'acc-006':{id:'acc-006',name:'SunCoast Logistics',industry:'Logistics',segment:'Mid-Market'},
  'acc-007':{id:'acc-007',name:'State of Louisiana',industry:'Government',segment:'Public Sector'},

const PRODUCTS_SHORT = {
  'prd-001':{id:'prd-001',name:'watsonx.ai',family:'watsonx',color:'#a56eff'},
  'prd-002':{id:'prd-002',name:'watsonx.data',family:'watsonx',color:'#a56eff'},
  'prd-003':{id:'prd-003',name:'watsonx.governance',family:'watsonx',color:'#a56eff'},
  'prd-004':{id:'prd-004',name:'IBM Cloud Pak for Security',family:'Security',color:'#da1e28'},
  'prd-005':{id:'prd-005',name:'IBM OpenPages',family:'Risk & Compliance',color:'#ff832b'},
  'prd-006':{id:'prd-006',name:'IBM Sterling OMS',family:'Supply Chain',color:'#009d9a'},
  'prd-007':{id:'prd-007',name:'IBM Turbonomic',family:'AIOps',color:'#6929c4'},
  'prd-008':{id:'prd-008',name:'IBM Cognos Analytics',family:'Business Intelligence',color:'#1192e8'},
};

const DEPS_SHORT = {
  'dep-001':{id:'dep-001',name:'Turbonomic @ First National Bancorp',deploymentStatus:'LIVE',gainsightHealthLabel:'GREEN',adoptionPct:97},
  'dep-002':{id:'dep-002',name:'watsonx.ai @ Apex Technology',deploymentStatus:'IN_PROGRESS',gainsightHealthLabel:'YELLOW',adoptionPct:42},
  'dep-003':{id:'dep-003',name:'OpenPages @ Cascadia Insurance',deploymentStatus:'LIVE',gainsightHealthLabel:'YELLOW',adoptionPct:96},
  'dep-004':{id:'dep-004',name:'Sterling OMS @ Nova Retail',deploymentStatus:'STALLED',gainsightHealthLabel:'RED',adoptionPct:38},
  'dep-005':{id:'dep-005',name:'CP4Security @ First National',deploymentStatus:'IN_PROGRESS',gainsightHealthLabel:'YELLOW',adoptionPct:68},
  'dep-006':{id:'dep-006',name:'Cognos @ LA — DCFS',deploymentStatus:'LIVE',gainsightHealthLabel:'GREEN',adoptionPct:99},
  'dep-007':{id:'dep-007',name:'Cognos @ LA — DOTD',deploymentStatus:'STALLED',gainsightHealthLabel:'RED',adoptionPct:51},
};

const BADGE_COL={CE:['rgba(15,98,254,.12)','#0f62fe'],BSS:['rgba(255,131,43,.12)','#ff832b'],TSL:['rgba(0,157,154,.12)','#009d9a'],ATL:['rgba(165,110,255,.12)','#a56eff']};
const GS_COL={GREEN:'#24a148',YELLOW:'#f1c21b',RED:'#da1e28'};
const ST_COL={LIVE:'#24a148',IN_PROGRESS:'#1192e8',STALLED:'#da1e28'};

function renderPage(sel) {
  const bc = BADGE_COL[sel.sellerType] || BADGE_COL.CE;
  document.title = `IBM Scout — ${sel.name}`;
  document.getElementById('bc-name').textContent = sel.name;

  // Avatar bg color by type
  const avatarBg = {CE:'rgba(15,98,254,.12)',BSS:'rgba(255,131,43,.12)',TSL:'rgba(0,157,154,.12)',ATL:'rgba(165,110,255,.12)'}[sel.sellerType]||'rgba(15,98,254,.12)';

  document.getElementById('hero-avatar').style.borderColor = bc[1];
  document.getElementById('hero-label').style.color = bc[1];
  document.getElementById('hero-label').textContent = `${sel.sellerType} · ${sel.role}`;
  document.getElementById('hero-title').textContent = sel.name;
  document.getElementById('hero-sub').textContent = sel.description;
  document.getElementById('hero-band').textContent = sel.band.replace('Band ','B');
  document.getElementById('hero-band').style.color = bc[1];

  // Active tab label
  const tabEl = document.getElementById('active-tab');
  tabEl.textContent = `${sel.sellerType === 'CE' ? '🏢' : sel.sellerType === 'BSS' ? '📦' : sel.sellerType === 'TSL' ? '📡' : '🔧'} ${sel.sellerType}`;
  tabEl.style.color = bc[1];
  tabEl.style.borderColor = bc[1]+'66';
  tabEl.style.background = bc[0];

  document.getElementById('hero-tags').innerHTML = `
    <span class="h-tag" style="background:${bc[0]};color:${bc[1]};border:1px solid ${bc[1]}44">${sel.sellerType}</span>
    <span class="h-tag" style="background:rgba(0,0,0,.04);color:var(--ts);border:1px solid var(--border)">${sel.geo}</span>
    <span class="h-tag" style="background:rgba(0,0,0,.04);color:var(--ts);border:1px solid var(--border)">Hired ${sel.hireDate}</span>
    <a href="mailto:${sel.email}" style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(15,98,254,.08);color:var(--ibm-blue);border:1px solid rgba(15,98,254,.2);text-decoration:none">${sel.email}</a>`;

  const accounts = (sel.accounts||[]).map(a=>ACCOUNTS_SHORT[a]).filter(Boolean);
  const products = (sel.products||[]).map(p=>PRODUCTS_SHORT[p]).filter(Boolean);
  const deps = (sel.deployments||[]).map(d=>DEPS_SHORT[d]).filter(Boolean);
  const cosell = (sel.cosell||[]).map(s=>SELLERS[s]).filter(Boolean);
  const mgr = MANAGERS[sel.managerId];
  const ter = sel.territories && sel.territories[0];

  // KPIs
  document.getElementById('kpi-accounts').textContent = accounts.length || '—';
  document.getElementById('kpi-accs-sub').textContent = accounts.map(a=>a.name.split(' ')[0]).join(', ')||'none assigned';
  document.getElementById('kpi-products').textContent = products.length || '—';
  document.getElementById('kpi-prods-sub').textContent = products.map(p=>p.name.split(' ').pop()).join(', ')||'none';
  document.getElementById('kpi-deps').textContent = deps.length || '—';
  const redDeps = deps.filter(d=>d.gainsightHealthLabel==='RED').length;
  document.getElementById('kpi-deps-sub').textContent = redDeps ? `⚠ ${redDeps} RED` : deps.length ? 'all monitored' : 'none';
  document.getElementById('kpi-geo').textContent = sel.geo.split(',')[1]?.trim() || sel.geo.split(',')[0];
  document.getElementById('kpi-territory-sub').textContent = sel.geo;

  // Manager card
  if (mgr) {
    document.getElementById('mgr-section').style.display = 'block';
    document.getElementById('mgr-card-wrap').innerHTML = `
      <div class="mgr-card" onclick="window.location='manager.html?id=${mgr.id}'">
        <div class="mgr-avatar">👥</div>
        <div style="flex:1">
          <div class="mgr-name">${mgr.name}</div>
          <div class="mgr-role">${mgr.role} · ${mgr.band} · ${mgr.territory}</div>
        </div>
        <div style="font-size:10px;font-weight:700;color:var(--ibm-teal)">View profile →</div>
      </div>`;
  }

  // Accounts
  document.getElementById('cnt-accounts').textContent = accounts.length;
  document.getElementById('accounts-list').innerHTML = accounts.length ? accounts.map(a=>`
    <div class="data-row" onclick="window.location='account.html?id=${a.id}'">
      <div class="dr-dot" style="background:var(--ibm-cyan)"></div>
      <div><div class="dr-name">${a.name}</div><div class="dr-sub">${a.industry} · ${a.segment}</div></div>
      <div class="dr-badge" style="background:rgba(17,146,232,.12);color:var(--ibm-cyan)">${a.segment}</div>
    </div>`).join('') : '<div class="empty-state">No accounts assigned.</div>';

  // Products
  document.getElementById('cnt-products').textContent = products.length;
  document.getElementById('products-list').innerHTML = products.length ? products.map(p=>`
    <div class="prod-row" onclick="window.location='product.html?id=${p.id}'">
      <div class="prod-dot" style="background:${p.color}"></div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-badge" style="background:${p.color}18;color:${p.color}">${p.family}</div>
    </div>`).join('') : '<div class="empty-state">No product coverage.</div>';

  // Deployments
  document.getElementById('cnt-deps').textContent = deps.length;
  document.getElementById('deps-list').innerHTML = deps.length ? deps.map(d=>{
    const col = GS_COL[d.gainsightHealthLabel]||'#888';
    return `<div class="data-row" onclick="window.location='deployment.html?id=${d.id}'">
      <div class="dr-dot" style="background:${col}"></div>
      <div><div class="dr-name">${d.name}</div><div class="dr-sub">Adoption ${d.adoptionPct}% · ${d.deploymentStatus}</div></div>
      <div class="dr-badge" style="background:${col}18;color:${col}">${d.gainsightHealthLabel}</div>
    </div>`;
  }).join('') : '<div class="empty-state">No deployments driving.</div>';

  // Co-sell
  document.getElementById('cnt-cosell').textContent = cosell.length;
  document.getElementById('cosell-list').innerHTML = cosell.length ? cosell.map(s=>{
    const sbc = BADGE_COL[s.sellerType]||BADGE_COL.CE;
    return `<div class="data-row" onclick="window.location='seller.html?id=${s.id}'">
      <div class="dr-dot" style="background:${sbc[1]}"></div>
      <div><div class="dr-name">${s.name}</div><div class="dr-sub">${s.geo} · ${s.role}</div></div>
      <div class="dr-badge" style="background:${sbc[0]};color:${sbc[1]}">${s.sellerType}</div>
    </div>`;
  }).join('') : '<div class="empty-state">No co-sell partners mapped.</div>';

  // Actions
  document.getElementById('action-row').innerHTML = `
    <a href="search.html" class="action-btn secondary">← Back to Search</a>
    <a href="index.html#node=${sel.id}" class="action-btn secondary">🕸 View in Graph</a>
    <a href="mailto:${sel.email}" class="action-btn primary">✉ Email ${sel.name.split(' ')[0]}</a>`;
}

const id = new URLSearchParams(window.location.search).get('id');
if (id && SELLERS[id]) renderPage(SELLERS[id]);
else { document.getElementById('bc-name').textContent='Not Found'; document.getElementById('hero-title').textContent='Seller Not Found'; }

(async()=>{try{const r=await fetch(`${API}/healthz`,{signal:AbortSignal.timeout(1500)});if(r.ok){const b=document.getElementById('mode-badge');b.textContent='Live API';b.style.background='rgba(36,161,72,.1)';b.style.color='#24a148';b.style.borderColor='rgba(36,161,72,.2)';}}catch(_){}})();
</script>
</body>
</html>
